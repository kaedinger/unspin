name: Build & Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+-dev'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile unspind
        run: make build-daemon

      - name: Build TXZ package
        run: make package VERSION=${{ github.ref_name }}

      - name: Update .plg version
        run: make update-plg VERSION=${{ github.ref_name }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if [[ "${{ github.ref_name }}" == *-dev ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            $PRERELEASE \
            --generate-notes \
            "pkg/Unspin-${{ github.ref_name }}-x86_64-1.txz" \
            "unspin.plg"
